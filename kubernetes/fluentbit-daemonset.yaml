apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  template:
    metadata:
      labels:
        k8s-app: fluent-bit
    spec:
      serviceAccountName: fluent-bit

      containers:
      - name: fluent-bit
        image: amazon/aws-for-fluent-bit:latest

        volumeMounts:
        - name: varlog
          mountPath: /var/log

        - name: config
          mountPath: /fluent-bit/etc/

      terminationGracePeriodSeconds: 10

      volumes:
      - name: varlog
        hostPath:
          path: /var/log

      - name: config
        configMap:
          name: fluent-bit-config