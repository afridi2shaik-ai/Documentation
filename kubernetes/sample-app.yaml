apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: devops-assignment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-container
        image: busybox
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            echo "$(date) INFO Application running successfully";
            echo "$(date) ERROR Database connection failed";
            sleep 10;
          done
